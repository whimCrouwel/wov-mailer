<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; background: #f4f4f4; }
    .wrapper { max-width: 600px; margin: 32px auto; background: #fff; border-radius: 8px; overflow: hidden; }
    .header { background: #1a1a2e; padding: 24px 32px; }
    .header h1 { color: #fff; margin: 0; font-size: 20px; }
    .body { padding: 32px; color: #333; line-height: 1.6; }
    .body h1, .body h2, .body h3 { color: #1a1a2e; }
    .footer { background: #f9f9f9; padding: 16px 32px; text-align: center; font-size: 12px; color: #999; border-top: 1px solid #eee; }
    .footer a { color: #999; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <h1>Whim on Vim</h1>
    </div>
    <div class="body">
      {{BODY}}
    </div>
    <div class="footer">
      <a href="{{UNSUBSCRIBE_URL}}">配信停止する</a>
    </div>
  </div>
</body>
</html>
