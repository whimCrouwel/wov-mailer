<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="ja">
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email</title>
  <style type="text/css">
    body { margin: 0; padding: 0; background-color: #0f0f0f; }
    table { border-collapse: collapse; }
    .body-text h1 { font-size: 22px; font-weight: 700; color: #f0f0f0; margin: 0 0 16px; }
    .body-text h2 { font-size: 17px; font-weight: 600; color: #e0e0e0; margin: 24px 0 12px; border-bottom: 1px solid #2a2a2a; padding-bottom: 8px; }
    .body-text h3 { font-size: 14px; font-weight: 600; color: #ccc; margin: 20px 0 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .body-text p  { margin: 0 0 16px; }
    .body-text ul, .body-text ol { margin: 0 0 16px; padding-left: 24px; }
    .body-text li { margin-bottom: 6px; }
    .body-text a  { color: #a78bfa; text-decoration: underline; }
    .body-text strong { font-weight: 600; color: #f0f0f0; }
    .body-text blockquote { margin: 0 0 16px; padding: 12px 16px; border-left: 3px solid #6d28d9; color: #aaa; background: #1a1a1a; border-radius: 0 4px 4px 0; }
    .body-text code { background: #1e1e1e; color: #c084fc; padding: 2px 5px; border-radius: 3px; font-family: monospace; font-size: 13px; }
    @media only screen and (max-width: 620px) {
      .outer { width: 100% !important; }
      .header-cell { padding: 24px 20px !important; }
      .body-cell  { padding: 24px 20px !important; }
    }
  </style>
</head>
<body style="margin:0;padding:0;background-color:#0f0f0f;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0f0f0f;">
    <tr>
      <td align="center" style="padding:32px 16px;">

        <table class="outer" width="600" cellpadding="0" cellspacing="0" border="0">

          <!-- Header -->
          <tr>
            <td class="header-cell" style="padding:28px 40px 24px;background:#18181b;border-radius:8px 8px 0 0;border-bottom:1px solid #27272a;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td>
                    <span style="font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:700;color:#f4f4f5;letter-spacing:0.02em;">Whim on Vim</span>
                    <span style="font-family:Arial,Helvetica,sans-serif;font-size:11px;color:#71717a;margin-left:10px;letter-spacing:0.08em;text-transform:uppercase;">Newsletter</span>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td class="body-cell body-text" style="padding:32px 40px;background:#18181b;font-family:Arial,Helvetica,sans-serif;font-size:15px;line-height:1.75;color:#a1a1aa;">
              {{BODY}}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:20px 40px;background:#111111;border-radius:0 0 8px 8px;border-top:1px solid #27272a;font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#52525b;text-align:center;">
              © Whim on Vim &nbsp;·&nbsp;
              <a href="{{UNSUBSCRIBE_URL}}" style="color:#52525b;text-decoration:underline;">配信停止する</a>
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>
</body>
</html>
